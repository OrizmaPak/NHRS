global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: node_exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: blackbox_services
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://api-gateway:8080/health
          - http://auth-api:8081/health
          - http://otp-service:8082/health
          - http://session-service:8083/health
          - http://token-service:8084/health
          - http://nin-linking-service:8085/health
          - http://rbac-service:8090/health
          - http://audit-log-service:8091/health
          - http://user-profile-service:8092/health
          - http://organization-service:8093/health
          - http://doctor-registry-service:8094/health
          - http://health-records-service:8095/health
          - http://encounter-notes-service:8096/health
          - http://laboratory-service:8097/health
          - http://pharmacy-dispensing-service:8098/health
          - http://emergency-requests-service:8099/health
          - http://catalog-service:8100/health
          - http://notification-service:8101/health
          - http://file-document-service:8102/health
          - http://nginx:80/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [__param_target]
        regex: 'http://([^:/]+)(?::[0-9]+)?/.*'
        target_label: service
      - target_label: __address__
        replacement: blackbox-exporter:9115
