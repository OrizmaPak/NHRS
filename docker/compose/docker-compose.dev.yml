      - ../../services/core-platform/authentication/auth-api/.env
    ports:
      - "${AUTH_API_PORT}:${AUTH_API_PORT}"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:'+process.env.PORT+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
