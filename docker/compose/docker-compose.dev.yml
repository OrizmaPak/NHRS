  prometheus:
    restart: always
    image: prom/prometheus:v2.54.1
    volumes:
      - ../../docker/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    networks:
      - nhrs_net
    depends_on:
      cadvisor:
        condition: service_started
      node-exporter:
        condition: service_started
      blackbox-exporter:
        condition: service_started

  grafana:
    restart: always
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../../docker/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../../docker/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../docker/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - nhrs_net

  cadvisor:
    restart: always
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - "8088:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - nhrs_net

  node-exporter:
    restart: always
    image: prom/node-exporter:v1.8.2
    ports:
      - "9100:9100"
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro
    networks:
      - nhrs_net

  blackbox-exporter:
    restart: always
    image: prom/blackbox-exporter:v0.25.0
    ports:
      - "9115:9115"
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ../../docker/monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - nhrs_net

networks:
  nhrs_net:
    driver: bridge



