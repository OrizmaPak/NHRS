services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ../../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../docker/nginx/conf.d/gateway.conf:/etc/nginx/conf.d/gateway.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    env_file:
      - ../../.env
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  api-gateway:
    build:
      context: ../../services/core-platform/api-gateway
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      - PORT=${GATEWAY_PORT}
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${GATEWAY_PORT}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
  auth-api:
    build:
      context: ../../services/core-platform/authentication/auth-api
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      - PORT=${AUTH_API_PORT}
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${AUTH_API_PORT}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
  otp-service:
    build:
      context: ../../services/core-platform/authentication/otp-service
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      - PORT=${OTP_PORT}
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${OTP_PORT}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
  session-service:
    build:
      context: ../../services/core-platform/authentication/session-service
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      - PORT=${SESSION_PORT}
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SESSION_PORT}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
  token-service:
    build:
      context: ../../services/core-platform/authentication/token-service
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      - PORT=${TOKEN_PORT}
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${TOKEN_PORT}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
  nin-linking-service:
    build:
      context: ../../services/core-platform/authentication/nin-linking-service
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      - PORT=${NIN_LINK_PORT}
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${NIN_LINK_PORT}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
networks:
  nhrs_net:
    driver: bridge
