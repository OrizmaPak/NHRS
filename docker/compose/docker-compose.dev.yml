services:
  nginx:
    restart: always
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ../../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../docker/nginx/conf.d/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    env_file:
      - ../../.env
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    restart: always
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    restart: always
    build:
      context: ../../
      dockerfile: services/core-platform/api-gateway/Dockerfile
    env_file:
      - ../../.env
      - ../../services/core-platform/api-gateway/.env
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      auth-api:
        condition: service_healthy
      rbac-service:
        condition: service_healthy
      organization-service:
        condition: service_healthy
      membership-service:
        condition: service_healthy
      health-records-index-service:
        condition: service_healthy
      clinical-encounter-service:
        condition: service_healthy
      laboratory-result-service:
        condition: service_healthy
      pharmacy-dispense-service:
        condition: service_healthy
      emergency-inventory-service:
        condition: service_healthy
      taskforce-directory-service:
        condition: service_healthy
      case-service:
        condition: service_healthy
      ui-theme-service:
        condition: service_healthy
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:'+process.env.PORT+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  auth-api:
    restart: always
    build:
      context: ../../
      dockerfile: services/core-platform/authentication/auth-api/Dockerfile
    env_file:
