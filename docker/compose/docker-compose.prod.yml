services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../docker/nginx/conf.d/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    env_file:
      - ../../.env
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    image: nhrs/api-gateway:${NHRS_IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ../../.env
      - ../../services/core-platform/api-gateway/.env
    depends_on:
      auth-api:
        condition: service_healthy
      rbac-service:
        condition: service_healthy
      organization-service:
        condition: service_healthy
      membership-service:
        condition: service_healthy
    networks:
      - nhrs_net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:'+process.env.PORT+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  auth-api:
    image: nhrs/auth-api:${NHRS_IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ../../.env
      - ../../services/core-platform/authentication/auth-api/.env
